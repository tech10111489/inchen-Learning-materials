<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>피부유형 판별 학습 시스템</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; }
        .animate-bounce { animation: bounce 1s infinite; }
        @keyframes bounce {
            0%, 100% { transform: translateY(-5%); animation-timing-function: cubic-bezier(0.8, 0, 1, 1); }
            50% { transform: translateY(0); animation-timing-function: cubic-bezier(0, 0, 0.2, 1); }
        }
    </style>
</head>
<body class="bg-pink-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 아이콘 컴포넌트 유틸리티 (오류 수정 버전)
        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    // React의 Virtual DOM과 Lucide의 직접적인 DOM 조작 간의 충돌을 방지하기 위해
                    // innerHTML을 초기화하고 지정된 ref 노드 내에서만 아이콘을 생성합니다.
                    iconRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        root: iconRef.current,
                        attrs: {
                            width: size,
                            height: size,
                            class: className
                        }
                    });
                }
            }, [name, size, className]);

            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        // 올린 머리 캐릭터 컴포넌트
        const UpdoCharacter = ({ isCorrect }) => (
            <div className="absolute -bottom-4 right-4 md:right-10 flex flex-col items-center z-20 pointer-events-none transition-all duration-500 transform translate-y-0 opacity-100">
                <div className={`relative px-5 py-3 rounded-2xl shadow-xl border-2 font-black text-lg md:text-xl whitespace-nowrap mb-2 animate-bounce ${isCorrect ? 'bg-white border-pink-400 text-pink-600' : 'bg-slate-800 border-slate-600 text-white'}`}>
                    {isCorrect ? "그렇지~~~ 잘했어! ✨" : "아~~~니~~~ 💢"}
                    <div className={`absolute -bottom-2.5 right-1/2 translate-x-1/2 w-5 h-5 border-b-2 border-r-2 transform rotate-45 ${isCorrect ? 'bg-white border-pink-400' : 'bg-slate-800 border-slate-600'}`}></div>
                </div>
                
                <svg width="120" height="120" viewBox="0 0 130 130" className="drop-shadow-2xl">
                    <defs>
                        <linearGradient id="naraeHair" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style={{stopColor:'#795548', stopOpacity:1}} />
                            <stop offset="100%" style={{stopColor:'#4E342E', stopOpacity:1}} />
                        </linearGradient>
                        <linearGradient id="naraeSkin" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style={{stopColor:'#FFF3E0', stopOpacity:1}} />
                            <stop offset="100%" style={{stopColor:'#FFE0B2', stopOpacity:1}} />
                        </linearGradient>
                    </defs>
                    <circle cx="65" cy="75" r="32" fill="url(#naraeHair)" />
                    <circle cx="65" cy="80" r="28" fill="url(#naraeSkin)" stroke="#FFCC80" strokeWidth="1"/>
                    <circle cx="65" cy="52" r="20" fill="url(#naraeHair)" stroke="#3E2723" strokeWidth="1" />
                    <path d="M 55 58 Q 65 65 75 58" stroke="#3E2723" strokeWidth="1" fill="none" opacity="0.3" />
                    <g>
                        {isCorrect ? (
                            <>
                                <circle cx="53" cy="80" r="4" fill="#3E2723" />
                                <circle cx="77" cy="80" r="4" fill="#3E2723" />
                                <circle cx="51" cy="78" r="1.5" fill="white" />
                                <circle cx="75" cy="78" r="1.5" fill="white" />
                                <path d="M 58 92 Q 65 98 72 92" stroke="#D81B60" strokeWidth="2.5" fill="none" strokeLinecap="round" />
                                <ellipse cx="48" cy="88" rx="6" ry="3" fill="#FFAB91" opacity="0.8" />
                                <ellipse cx="82" cy="88" rx="6" ry="3" fill="#FFAB91" opacity="0.8" />
                            </>
                        ) : (
                            <>
                                <path d="M 48 72 L 58 76" stroke="#3E2723" strokeWidth="2" strokeLinecap="round" />
                                <path d="M 72 76 L 82 72" stroke="#3E2723" strokeWidth="2" strokeLinecap="round" />
                                <path d="M 50 82 Q 53 78 56 82" stroke="#3E2723" strokeWidth="2.5" fill="none" strokeLinecap="round" />
                                <path d="M 74 82 Q 77 78 80 82" stroke="#3E2723" strokeWidth="2.5" fill="none" strokeLinecap="round" />
                                <path d="M 58 96 Q 65 88 72 96" stroke="#D81B60" strokeWidth="2.5" fill="none" strokeLinecap="round" />
                                <ellipse cx="48" cy="88" rx="5" ry="2" fill="#90A4AE" opacity="0.3" />
                                <ellipse cx="82" cy="88" rx="5" ry="2" fill="#90A4AE" opacity="0.3" />
                            </>
                        )}
                    </g>
                    <path d="M 58 68 Q 65 72 72 68" stroke="#FBC02D" strokeWidth="2" fill="none" />
                </svg>
            </div>
        );

        const App = () => {
            const [mode, setMode] = useState('home');
            const [difficulty, setDifficulty] = useState('EASY');
            const [questions, setQuestions] = useState([]);
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [answerStatus, setAnswerStatus] = useState(null); 
            const [quizFinished, setQuizFinished] = useState(false);
            const [showHint, setShowHint] = useState(false);

            const rawData = [
                { difficulty: 'EASY', answer: '정상피부', text: '적당한 수분과 유분을 가지고 있어 피부표면이 촉촉하고 매끄럽고 윤기가 있다.', hint: '유수분 밸런스가 가장 이상적인 상태입니다.', explanation: '정상피부는 피지선과 한선의 기능이 정상적이어서 유분과 수분이 조화를 이루며, 건강한 광택을 띠는 것이 가장 큰 특징입니다.' },
                { difficulty: 'EASY', answer: '정상피부', text: '피부의 수분 함유량이 12% 정도이며 촉촉하다.', hint: '수분 함유량 "12%"는 이 유형의 대표적인 수치입니다.', explanation: '피부과학적으로 건강한 정상피부의 각질층 수분 함유량은 보통 12~13%로 정의됩니다. 10% 이하는 건성으로 분류됩니다.' },
                { difficulty: 'EASY', answer: '정상피부', text: '혈액순환이 잘되어 혈색이 좋으나 T-zone은 약간 번들거림이 있다.', hint: '전반적으로 좋으나 T존만 약간 유분이 있는 이상적 상태입니다.', explanation: '정상피부라도 이마와 코를 잇는 T-zone은 피지선이 발달해 있어 약간의 번들거림이 있을 수 있으나, 이는 정상 범위에 속합니다.' },
                { difficulty: 'EASY', answer: '건성피부', text: '각질층의 수분이 10%이하이고 눈 주위 잔주름이 보인다.', hint: '수분 "10% 이하"는 이 유형의 결정적 단서입니다.', explanation: '각질층의 수분이 10% 미만으로 떨어지면 피부의 유연성이 급격히 저하되어 눈가 등 얇은 부위에 잔주름이 생기기 시작합니다.' },
                { difficulty: 'EASY', answer: '건성피부', text: '소릉과 소구 높이 차이가 거의 없으며 선명 하지 않다.', hint: '피부 결의 굴곡이 거의 없이 밋밋하고 얇은 상태입니다.', explanation: '건성피부는 피부가 얇고 유연성이 떨어져 소릉(피부의 솟은 부분)과 소구(피부의 골)의 높이 차이가 거의 없이 밋밋하게 관찰됩니다.' },
                { difficulty: 'EASY', answer: '건성피부', text: '세안 후 당김은 없으나 시간이 지나면서 당김이 있고 버짐이 생긴다.', hint: '즉각적인 당김보다 "시간이 흐른 뒤의 당김"이 포인트입니다.', explanation: '건성피부는 피지 보호막 형성이 느려 세안 직후보다 시간이 지날수록 수분이 공기 중으로 증발하며 강한 당김과 버짐 현상이 나타납니다.' },
                { difficulty: 'EASY', answer: '지성피부', text: '피부가 두껍고 표면이 귤껍질처럼 보이며 메이크업이 잘 지워진다.', hint: '"귤껍질" 같은 모공 확장은 이 유형의 핵심 키워드입니다.', explanation: '과도한 피지 분비로 인해 피지 배출구인 모공이 넓어지고, 각질이 두껍게 쌓여 피부 표면이 마치 귤껍질처럼 거칠게 보입니다.' },
                { difficulty: 'EASY', answer: '지성피부', text: '피지 분비량이 많으나 당김이 심하고 피부가 예민하고 표피 박리가 쉽게 일어난다.', hint: '유분은 많지만 수분이 부족한 "수부지" 상태를 설명합니다.', explanation: '이를 "수분 부족형 지성"이라 합니다. 유분은 많지만 피부 내부의 보습 인자가 부족하여 당김을 느끼고 각질(표피 박리)이 일어나는 예민한 상태입니다.' },
                { difficulty: 'EASY', answer: '지성피부', text: '소릉과 소구가 뚜렷하고 피부가 번들 거린다. / 소구와 소릉의 높이차가 심하며 각질층이 두껍다.', hint: '피부 결의 굴곡(높이차)이 매우 크고 거칠게 느껴집니다.', explanation: '지성피부는 피지 분비와 각질 비후 현상으로 인해 피부 결의 굴곡(소구와 소릉의 높이 차이)이 매우 크고 거칠어 보이는 것이 특징입니다.' },
                { difficulty: 'HARD', answer: '건성피부', text: '피지선과 한선의 기능저하로 피부탄력저하 현상이 보이며 모세혈관 확장 현상이 나타나기 쉽다.', hint: '기능 저하로 인해 "모세혈관"이 보일 정도로 얇아진 상태입니다.', explanation: '피지선(기름샘)과 한선(땀샘)의 기능이 모두 저하되면 피부가 매우 건조하고 얇아지며, 진피층의 모세혈관이 비쳐 보일 정도로 예민해집니다.' },
                { difficulty: 'HARD', answer: '지성피부', text: '계절적 영향을 받기도하나 주로 청소년에게 많이 발생하며 외부 물리적 자극에는 비교적 강하다.', hint: '호르몬 영향으로 피지분비가 왕성한 시기에 흔합니다.', explanation: '지성피부는 피부가 두껍고 유분이 천연 보호막 역할을 하기 때문에 건성피부에 비해 물리적 자극이나 외부 환경에 저항력이 강한 편입니다.' },
                { difficulty: 'HARD', answer: '정상피부', text: '계절의 변화에 따라 여름에 지성, 겨울에 건성화 될 수 있지만 트러블은 잘 발생하지 않는다.', hint: '환경에 적응은 하되 심각한 문제로 이어지지 않는 건강한 피부입니다.', explanation: '정상피부는 환경 변화에 유연하게 대응합니다. 계절에 따라 피부 상태가 조금씩 변하더라도 스스로 밸런스를 조절하여 트러블을 예방하는 능력이 뛰어납니다.' },
                { difficulty: 'HARD', answer: '건성피부', text: '모공의 늘어짐이 눈에 띄고 피부당김이 내부로부터 심하게 느껴진다.', hint: '탄력 저하로 모공이 처지고 "속당김"이 심한 경우입니다.', explanation: '피부 내부 수분이 부족하면 탄력 섬유가 약해져 모공이 세로로 늘어지며, 이를 보완할 유분마저 부족할 때 내부 당김이 극심해집니다.' },
                { difficulty: 'HARD', answer: '지성피부', text: '산화가 진행되고 있어 블랙 헤드가 많다.', hint: '피지가 공기와 만나 산화되면 블랙헤드가 됩니다.', explanation: '과잉 분비된 피지가 모공 밖으로 나오지 못하고 공기와 접촉하여 까맣게 변하는(산화) 현상은 지성피부의 대표적 고민입니다.' }
            ];

            const startQuiz = (level) => {
                const filtered = rawData.filter(q => q.difficulty === level);
                const shuffled = [...filtered].sort(() => Math.random() - 0.5).slice(0, 10);
                setQuestions(shuffled);
                setDifficulty(level);
                setMode('quiz');
                setCurrentQuestionIndex(0);
                setScore(0);
                setSelectedAnswer(null);
                setAnswerStatus(null);
                setQuizFinished(false);
                setShowHint(false);
            };

            const handleAnswer = (ans) => {
                if (selectedAnswer !== null) return;
                const isCorrect = ans === questions[currentQuestionIndex].answer;
                setSelectedAnswer(ans);
                setAnswerStatus(isCorrect ? 'correct' : 'incorrect');
                if (isCorrect) setScore(s => s + 1);
            };

            const nextQuestion = () => {
                if (currentQuestionIndex < questions.length - 1) {
                    setCurrentQuestionIndex(i => i + 1);
                    setSelectedAnswer(null);
                    setAnswerStatus(null);
                    setShowHint(false);
                } else {
                    setQuizFinished(true);
                }
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-4xl mx-auto">
                        <header className="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
                            <div>
                                <h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
                                    <Icon name="book-open" className="text-pink-600" />
                                    피부유형 판별 학습 시스템
                                </h1>
                                <p className="text-slate-500 font-medium italic">"정답의 이유를 아는 것이 진짜 실력입니다."</p>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => setMode('home')} className={`px-4 py-2 rounded-lg text-sm font-medium transition-all ${mode === 'home' ? 'bg-pink-500 text-white shadow-md' : 'bg-white text-slate-600 border border-pink-100'}`}>홈</button>
                            </div>
                        </header>

                        {mode === 'home' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div className="bg-white p-8 rounded-2xl shadow-sm border border-pink-100 text-center">
                                    <div className="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="list-checks" size={32} /></div>
                                    <h2 className="text-xl font-bold mb-2">EASY 챌린지</h2>
                                    <button onClick={() => startQuiz('EASY')} className="w-full py-3 bg-emerald-500 hover:bg-emerald-600 text-white rounded-xl font-bold transition-all">시작하기</button>
                                </div>
                                <div className="bg-white p-8 rounded-2xl shadow-sm border border-pink-100 text-center">
                                    <div className="w-16 h-16 bg-rose-100 text-rose-600 rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="help-circle" size={32} /></div>
                                    <h2 className="text-xl font-bold mb-2">HARD 챌린지</h2>
                                    <button onClick={() => startQuiz('HARD')} className="w-full py-3 bg-rose-500 hover:bg-rose-600 text-white rounded-xl font-bold transition-all">시작하기</button>
                                </div>
                            </div>
                        )}

                        {mode === 'quiz' && !quizFinished && (
                            <div>
                                <div className="mb-6 bg-white p-4 rounded-xl shadow-sm border border-pink-100 flex items-center justify-between relative z-30">
                                    <div className="flex items-center gap-3">
                                        <span className={`px-2 py-1 rounded text-xs font-bold ${difficulty === 'EASY' ? 'bg-emerald-100 text-emerald-700' : 'bg-rose-100 text-rose-700'}`}>{difficulty}</span>
                                        <span className="text-sm text-slate-500">문제 {currentQuestionIndex + 1} / {questions.length}</span>
                                    </div>
                                    <button 
                                        onClick={() => setShowHint(!showHint)}
                                        disabled={selectedAnswer !== null}
                                        className={`flex items-center gap-1.5 px-4 py-2 rounded-full text-sm font-bold transition-all shadow-sm ${
                                            showHint 
                                                ? 'bg-pink-600 text-white ring-2 ring-pink-300 animate-pulse' 
                                                : 'bg-pink-100 text-pink-600 hover:bg-pink-200 hover:shadow-md'
                                        } ${selectedAnswer !== null ? 'opacity-50 cursor-not-allowed' : ''}`}
                                    >
                                        <Icon name="lightbulb" size={16} />
                                        {showHint ? '힌트 닫기' : '결정적 힌트 보기'}
                                    </button>
                                </div>

                                <div className="bg-white p-8 rounded-2xl shadow-lg border border-pink-100 mb-6 relative min-h-[400px]">
                                    <h3 className="text-sm text-pink-400 mb-4 uppercase tracking-wider font-bold">Question</h3>
                                    <p className="text-2xl font-bold text-slate-800 leading-relaxed mb-8 italic relative z-10">
                                        "{questions[currentQuestionIndex].text}"
                                    </p>

                                    {showHint && selectedAnswer === null && (
                                        <div className="mb-8 p-4 bg-pink-50 border-2 border-pink-200 rounded-xl relative z-10 shadow-sm">
                                            <p className="text-base text-pink-700 leading-relaxed font-bold flex gap-2 items-start">
                                                <Icon name="lightbulb" size={20} className="shrink-0 mt-1" />
                                                <span>{questions[currentQuestionIndex].hint}</span>
                                            </p>
                                        </div>
                                    )}

                                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8 relative z-10">
                                        {['정상피부', '건성피부', '지성피부'].map((choice) => {
                                            let buttonClass = "py-4 px-6 rounded-xl font-bold border-2 transition-all flex items-center justify-center gap-2 ";
                                            const isCorrect = choice === questions[currentQuestionIndex].answer;
                                            const isSelected = selectedAnswer === choice;
                                            if (selectedAnswer === null) buttonClass += "border-slate-100 bg-slate-50 hover:border-pink-300 hover:bg-white text-slate-700";
                                            else if (isSelected) buttonClass += isCorrect ? "border-emerald-500 bg-emerald-50 text-emerald-700" : "border-rose-500 bg-rose-50 text-rose-700";
                                            else if (isCorrect) buttonClass += "border-emerald-500 bg-emerald-50 text-emerald-700 shadow-sm";
                                            else buttonClass += "border-slate-100 bg-slate-50 text-slate-400 opacity-50";
                                            return (
                                                <button key={choice} onClick={() => handleAnswer(choice)} disabled={selectedAnswer !== null} className={buttonClass}>
                                                    {selectedAnswer !== null && isCorrect && <Icon name="check-circle-2" size={18} />}
                                                    {selectedAnswer === choice && !isCorrect && <Icon name="x-circle" size={18} />}
                                                    {choice}
                                                </button>
                                            );
                                        })}
                                    </div>

                                    {selectedAnswer !== null && (
                                        <div className="p-5 bg-pink-50 border border-pink-200 rounded-2xl relative z-10">
                                            <div className="flex items-center gap-2 text-pink-700 mb-2 font-bold">
                                                <Icon name="info" size={18} />
                                                해설 및 정답의 근거
                                            </div>
                                            <p className="text-slate-700 leading-relaxed text-sm w-full md:w-3/4">
                                                {questions[currentQuestionIndex].explanation}
                                            </p>
                                        </div>
                                    )}

                                    {answerStatus !== null && (
                                        <UpdoCharacter isCorrect={answerStatus === 'correct'} />
                                    )}
                                </div>

                                {selectedAnswer !== null && (
                                    <div className="flex justify-end">
                                        <button onClick={nextQuestion} className="flex items-center gap-2 px-8 py-3 bg-pink-500 text-white rounded-xl font-bold shadow-lg hover:bg-pink-600 transition-all">
                                            {currentQuestionIndex === questions.length - 1 ? '결과 보기' : '다음 문제'}
                                            <Icon name="chevron-right" size={20} />
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}

                        {quizFinished && (
                            <div className="bg-white p-12 rounded-2xl shadow-xl border border-pink-100 text-center">
                                <div className="w-24 h-24 bg-pink-100 text-pink-600 rounded-full flex items-center justify-center mx-auto mb-6"><Icon name="award" size={48} /></div>
                                <h2 className="text-3xl font-bold mb-2">테스트 종료!</h2>
                                <div className="text-6xl font-black text-pink-600 mb-8">{score} / {questions.length}</div>
                                <div className="flex gap-4 justify-center">
                                    <button onClick={() => startQuiz(difficulty)} className="px-6 py-3 bg-slate-100 text-slate-700 rounded-xl font-bold hover:bg-slate-200 transition-all flex items-center gap-2"><Icon name="rotate-ccw" size={18}/> 다시하기</button>
                                    <button onClick={() => setMode('home')} className="px-6 py-3 bg-pink-500 text-white rounded-xl font-bold hover:bg-pink-600">메인으로</button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
