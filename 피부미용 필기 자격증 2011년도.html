<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미용사(피부) 필기 전수 퀴즈 - 루미나래</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #F0F2F5;
            color: #3C1E1E;
            -webkit-tap-highlight-color: transparent;
        }
        .kakao-yellow { background-color: #FEE500; }
        .dark-brown { color: #3C1E1E; }
        .bg-dark-brown { background-color: #3C1E1E; }
        
        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        .animate-shimmer {
            position: relative;
            overflow: hidden;
        }
        .animate-shimmer::after {
            content: "";
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
            animation: shimmer 2s infinite linear;
        }

        button:disabled { cursor: default; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Intro Screen -->
    <div id="intro-screen" class="fixed inset-0 z-50 bg-[#F0F2F5] flex items-center justify-center p-6">
        <div class="bg-white rounded-[3rem] p-10 w-full max-w-md text-center shadow-2xl border-4 border-[#FEE500] animate-fade-in">
            <div class="w-24 h-24 kakao-yellow rounded-full flex items-center justify-center mx-auto mb-8 shadow-inner">
                <i data-lucide="book-open" class="w-12 h-12 text-[#3C1E1E]"></i>
            </div>
            <h1 class="text-2xl font-black text-[#3C1E1E] mb-2 tracking-tighter italic">LUMINARAE</h1>
            <h2 class="text-xl font-bold text-[#3C1E1E] mb-6">피부미용 필기 전수 분석</h2>
            <p class="text-gray-500 mb-10 text-sm leading-relaxed font-medium">
                학생여러분, AI 루미나래입니다.<br/>
                시험에 나올 수 있는 엄선된 문제입니다.<br/>
                다음 60문제를 지금 바로 준비해드리겠습니다. 홧팅!
            </p>
            <button onclick="startQuiz()" class="w-full bg-dark-brown text-[#FEE500] py-5 rounded-2xl font-black text-lg hover:opacity-90 active:scale-95 transition-all shadow-xl">
                시험 시작
            </button>
        </div>
    </div>

    <!-- Main Quiz UI (Initially Hidden) -->
    <div id="quiz-ui" class="hidden flex-col min-h-screen">
        <!-- Header -->
        <header class="kakao-yellow p-4 flex items-center justify-between sticky top-0 z-20 shadow-sm border-b border-[#3C1E1E]/10">
            <div class="flex items-center gap-3">
                <div class="bg-white p-2 rounded-2xl shadow-sm border border-[#3C1E1E]/5">
                    <i data-lucide="book-open" class="w-5 h-5 text-[#3C1E1E]"></i>
                </div>
                <div>
                    <h1 class="font-extrabold text-base text-[#3C1E1E] tracking-tight italic uppercase">Luminarae</h1>
                    <p class="text-[10px] text-[#3C1E1E]/60 font-bold tracking-widest leading-none uppercase">Assistant Manager</p>
                </div>
            </div>
            <div class="text-[#3C1E1E] font-black text-xs bg-white/60 px-4 py-2 rounded-full border border-[#3C1E1E]/10">
                PAGE <span id="current-page-num">1</span> / 60
            </div>
        </header>

        <!-- Quiz Content -->
        <main class="flex-1 p-4 max-w-2xl mx-auto w-full pt-6 pb-40">
            <div id="question-card" class="animate-fade-in">
                <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border border-white relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-4 opacity-5 pointer-events-none">
                        <i data-lucide="message-circle" class="w-32 h-32 fill-[#3C1E1E]"></i>
                    </div>

                    <div class="flex items-center gap-2 mb-6">
                        <span class="bg-dark-brown text-[#FEE500] px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-tighter">
                            문제 <span id="display-q-num">1</span>
                        </span>
                        <span id="data-entry-id" class="text-[10px] font-bold text-gray-300">#DATA_ENTRY_1</span>
                    </div>

                    <h2 id="question-text" class="text-xl font-black leading-snug text-[#1a1a1a] mb-10">
                        질문 로딩 중...
                    </h2>

                    <div id="options-container" class="space-y-3 relative z-10">
                        <!-- Options will be injected here -->
                    </div>

                    <!-- Explanation Area (Initially Hidden) -->
                    <div id="explanation-area" class="hidden mt-8">
                        <div class="bg-[#FDF9F0] p-6 rounded-3xl border border-[#3C1E1E]/5 shadow-inner">
                            <div class="flex items-center gap-2 font-black mb-3 text-[#3C1E1E] text-sm">
                                <i data-lucide="message-circle" class="w-4 h-4 fill-[#3C1E1E]"></i>
                                정답 해설
                            </div>
                            <p id="explanation-text" class="text-[#3C1E1E] text-[15px] leading-relaxed font-semibold">
                                해설 내용...
                            </p>
                        </div>
                        <button onclick="goToNextQuestion()" class="mt-8 w-full bg-dark-brown text-[#FEE500] py-5 rounded-2xl font-black text-lg flex items-center justify-center gap-3 hover:opacity-90 transition-all shadow-xl shadow-black/10 active:scale-95">
                            <span id="next-btn-text">다음 문제로</span>
                            <i data-lucide="chevron-right" class="w-6 h-6"></i>
                        </button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer Progress -->
        <footer class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-gray-100 p-6 z-10 shadow-2xl">
            <div class="max-w-2xl mx-auto">
                <div class="flex justify-between items-center mb-4 px-1">
                    <span class="text-[10px] font-black text-gray-400 uppercase tracking-[0.3em]">Analysis Progress</span>
                    <div class="flex items-baseline gap-1">
                        <span id="progress-text" class="text-2xl font-black text-[#3C1E1E] tracking-tighter">0</span>
                        <span class="text-xs font-bold text-gray-300">/ 60</span>
                    </div>
                </div>
                <div class="h-3 w-full bg-gray-100 rounded-full overflow-hidden border border-gray-50">
                    <div id="progress-bar" class="h-full kakao-yellow transition-all duration-700 ease-in-out rounded-full relative shadow-[0_0_10px_rgba(254,229,0,0.5)] animate-shimmer" style="width: 0%">
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <!-- Result Screen (Initially Hidden) -->
    <div id="result-screen" class="hidden fixed inset-0 bg-[#3C1E1E]/90 backdrop-blur-lg z-[60] items-center justify-center p-6">
        <div class="bg-white rounded-[3.5rem] p-10 w-full max-w-md text-center shadow-2xl border-[6px] border-[#FEE500]">
            <div class="w-24 h-24 kakao-yellow rounded-full flex items-center justify-center mx-auto mb-8 shadow-inner ring-4 ring-white">
                <i data-lucide="trophy" class="w-12 h-12 text-[#3C1E1E]"></i>
            </div>
            <h2 class="text-3xl font-black mb-2 text-[#3C1E1E]">보고 완료</h2>
            <p class="text-gray-400 mb-10 font-bold leading-tight">학생여러분, 오늘 준비한 모든 문항에 대한<br/>분석이 성공적으로 종료되었습니다.</p>
            
            <div class="grid grid-cols-2 gap-5 mb-10">
                <div class="bg-gray-50 p-6 rounded-[2.5rem] border border-gray-100">
                    <p class="text-[10px] text-gray-400 font-black mb-2 uppercase tracking-widest">정답 문항</p>
                    <p class="text-4xl font-black text-[#3C1E1E]"><span id="final-score">0</span> <span class="text-sm font-bold text-gray-300">/ 60</span></p>
                </div>
                <div class="bg-gray-50 p-6 rounded-[2.5rem] border border-gray-100">
                    <p class="text-[10px] text-gray-400 font-black mb-2 uppercase tracking-widest">수행 등급</p>
                    <p id="final-grade" class="text-4xl font-black text-blue-600">0점</p>
                </div>
            </div>

            <div class="flex flex-col gap-3">
                <button onclick="location.reload()" class="w-full bg-dark-brown text-[#FEE500] py-5 rounded-2xl font-black text-lg flex items-center justify-center gap-2 hover:opacity-90 active:scale-95 transition-all shadow-lg">
                    <i data-lucide="refresh-cw" class="w-5 h-5"></i> 분석 재개하기
                </button>
                <button onclick="window.print()" class="w-full bg-gray-100 text-[#3C1E1E] py-5 rounded-2xl font-black text-lg flex items-center justify-center gap-2 hover:bg-gray-200 active:scale-95 transition-all shadow-md">
                    <i data-lucide="share-2" class="w-5 h-5"></i> 리포트 저장
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- 데이터베이스 구성 (240문항 전수 수록) ---
        const ALL_QUESTIONS = [
            // [1차 기출 - 60문항]
            { set: 1, id: 1, q: "매뉴얼 테크닉의 쓰다듬기(effleurage) 동작에 대한 설명 중 맞는 것은?", options: ["피부 깊숙이 자극하여 혈액순환을 증진한다.", "근육에 자극을 주기 위하여 깊고 지속적으로 누르는 방법이다.", "매뉴얼 테크닉의 시작과 마무리에 사용한다.", "손가락으로 가볍게 두드리는 방법이다."], ans: 2, exp: "쓰다듬기는 피부 표면을 가볍게 문질러 긴장을 완화하고 관리를 시작하거나 마무리할 때 주로 사용합니다." },
            { set: 1, id: 2, q: "림프 드레니쥐의 주된 작용은?", options: ["혈액순환과 신진대사 저하", "노폐물과 독소 물질을 림프절로 운반", "피부 조직 강화", "림프 순환 저하"], ans: 1, exp: "림프 드레니쥐는 림프액의 흐름을 원활하게 하여 체내의 노폐물과 독소를 정화하는 역할을 합니다." },
            { set: 1, id: 3, q: "다음 중 일시적 제모에 속하지 않는 것은?", options: ["전기 분해 법을 이용한 제모", "족집게를 이용한 제모", "왁스를 이용한 제모", "화학 탈모제를 이용한 제모"], ans: 0, exp: "전기 분해법은 모근을 파괴하는 영구 제모 방식입니다." },
            { set: 1, id: 4, q: "클렌징에 대한 설명이 아닌 것은?", options: ["피부의 피지, 메이크업 잔여물을 없애기 위한 작업이다.", "모공 깊숙이 있는 불순물과 피부 표면의 각질의 제거를 주목적으로 한다.", "제품 흡수를 효율적으로 도와준다.", "피부의 생리적인 기능을 정상적으로 도와준다."], ans: 1, exp: "딥 클렌징이 각질 제거를 목적으로 하며, 일반 클렌징은 표면 오염물 제거가 목적입니다." },
            { set: 1, id: 5, q: "짙은 화장을 지우는 클렌징 제품 타입으로 중성과 건성 피부에 적합하며, 사용 후 이중세안을 해야 하는 것은?", options: ["클렌징 크림", "클렌징 로션", "클렌징 워터", "클렌징 젤"], ans: 0, exp: "클렌징 크림은 유분기가 많아 짙은 메이크업 세정력이 우수하며 건성 피부에 권장됩니다." },
            { set: 1, id: 6, q: "다음 중 건성 피부에 적용되는 화장품 사용법으로 가장 적합한 것은?", options: ["낮에는 O/W형의 데이크림과 밤에는 W/O형의 나이트크림을 사용한다.", "강하게 탈지시켜 피지 샘 기능을 균형 있게 해주고 모공을 수축해주는 크림을 사용한다.", "봄, 여름에는 W/O크림을 사용하고 가을, 겨울에는 O/W크림을 사용한다.", "소량의 하이드로퀴논이 함유된 크림을 사용한다."], ans: 0, exp: "건성 피부는 낮에 수분 공급(O/W), 밤에 유분막 형성(W/O)을 통해 수분 증발을 막아야 합니다." },
            { set: 1, id: 7, q: "팩의 목적 및 효과와 가장 거리가 먼 것은?", options: ["피부의 혈행 촉진 및 청정 작용", "진정 및 수렴 작용", "피부 보습", "피하지방의 흡수 및 분해"], ans: 3, exp: "팩은 피부 외적인 진정, 보습, 청정을 돕지만 피하지방 분해 효과는 기대하기 어렵습니다." },
            { set: 1, id: 8, q: "신체 각 부위별 관리에서 매뉴얼 테크닉의 적용이 적합하지 않은 것은?", options: ["스트레스로 인해 근육이 경직된 경우", "림프 순환이 잘 안되어 붓는 경우", "심한 운동으로 근육이 뭉친 경우", "하체 부종이 심한 임산부의 경우"], ans: 3, exp: "임산부(특히 초기/말기)는 부종이 있더라도 전문가의 상담 없이 매뉴얼 테크닉을 시행해서는 안 됩니다." },
            { set: 1, id: 9, q: "피부 관리를 위한 피부 유형 분석의 시기로 가장 적합한 것은?", options: ["최초 상담 전", "트리트먼트 후", "클렌징이 끝난 후", "마사 후"], ans: 2, exp: "정확한 피부 상태 판별을 위해 노폐물을 제거한 클렌징 직후에 분석을 실시합니다." },
            { set: 1, id: 10, q: "여드름 피부에 관련된 설명으로 틀린 것은?", options: ["여드름은 사춘기에 피지 분비가 왕성해지면서 나타나는 비 염증성, 염증성 피부 발진이다.", "여드름은 사춘기에 일시적으로 나타나며 30대 정도에 모두 사라진다.", "다양한 원인에 의해 피지가 많이 생기고 모공 입구의 폐쇄로 인해 피지 배출이 잘 되지 않는다.", "선천적인 체질상 체내 호르몬의 이상 현상으로 지루성 피부에서 발생되는 여드름 형태는 심상성 여드름이라 한다."], ans: 1, exp: "여드름은 성인이 된 이후에도 환경적, 유전적 요인으로 지속될 수 있습니다." },
            { set: 1, id: 11, q: "매뉴얼 테크닉의 효과에 해당하지 않는 것은?", options: ["혈액 순환을 촉진시킨다.", "림프 순환을 촉진시킨다.", "근육의 긴장을 감소하고 피부 온도를 상승하여 기분을 좋게 한다.", "가슴과 복부 관리를 통해 생리 시, 임신 초기 또는 말기에 진정 효과를 준다."], ans: 3, exp: "생리 시나 임신 중인 고객에게는 가슴과 복부 관리를 삼가야 합니다." },
            { set: 1, id: 12, q: "웜 왁스를 이용하여 제모 하는 방법으로 옳은 것은?", options: ["제모 전에는 로션을 발라 피부를 보호한다.", "왁스는 털이 난 방향으로 발라준다.", "왁스를 제거할 때는 천천히 떼어낸다.", "제모 후에는 온습포를 이용해 시술 부위를 진정시킨다."], ans: 1, exp: "왁스는 털 방향으로 바르고, 제거는 털 반대 방향으로 빠르게 시행합니다." },
            { set: 1, id: 13, q: "마스크의 종류에 따른 사용 목적이 틀린 것은?", options: ["콜라겐 벨벳 마스크 - 진피 수분 공급", "고무 마스크 - 진정, 노폐물 흡착", "석고 마스크 - 영양 성분 침투", "머드 마스크 - 모공 청결, 피지 흡착"], ans: 0, exp: "콜라겐 벨벳 마스크는 주로 표피 각질층의 수분 보유력을 높이는 효과가 큽니다." },
            { set: 1, id: 14, q: "우리나라 피부 미용 역사에서 혼례 미용법이 발달하고, 세안을 위한 세제 등 목욕 용품이 발달한 시대는?", options: ["고조선 시대", "삼국시대", "고려시대", "조선시대"], ans: 3, exp: "조선시대에는 청결을 중시하여 조두(세안제) 등 다양한 목욕 용품이 발달했습니다." },

            { set: 4, id: 237, q: "면허 자격 틀린 것?", options: ["과정 이수", "3년 경력", "자격 취득자", "학과 졸업"], ans: 1, exp: "단순 경력만으로는 면허가 나오지 않으며 반드시 자격증이나 전공 학위가 있어야 합니다." },
            { set: 4, id: 238, q: "영업정지 중 영업 한 때?", options: ["10일", "20일", "1월", "폐쇄 명령"], ans: 3, exp: "영업 정지 명령을 무시하고 영업하면 바로 영업소 폐쇄 명령이 떨어집니다." },
            { set: 4, id: 239, q: "대여한 때 행정 조치?", options: ["시도지사 6월", "시도지사 1년", "시장 6월", "시장 1년"], ans: 2, exp: "면허 대여 시 1차 위반으로 6개월 면허 정지가 가해집니다." },
            { set: 4, id: 240, q: "영업소 외 장소 업무 가능 예외 아닌 것?", options: ["질병", "혼례", "국외 출타", "인정 사유"], ans: 2, exp: "단순히 놀러 가는 국외 출타는 출장 미용의 사유가 되지 않습니다." }
        ];

        // --- App State ---
        let questions = [];
        let currentIndex = 0;
        let score = 0;
        let isAnswered = false;
        let selectedAns = null;

        // --- Utils ---
        const generateQuizSet = () => {
            const finalSet = [];
            for (let s = 1; s <= 4; s++) {
                const setQuestions = ALL_QUESTIONS.filter(q => q.set === s);
                const shuffled = [...setQuestions].sort(() => Math.random() - 0.5);
                finalSet.push(...shuffled.slice(0, 15));
            }
            return finalSet.sort(() => Math.random() - 0.5);
        };

        // --- Core Logic ---
        function startQuiz() {
            questions = generateQuizSet();
            currentIndex = 0;
            score = 0;
            document.getElementById('intro-screen').classList.add('hidden');
            document.getElementById('quiz-ui').classList.remove('hidden');
            document.getElementById('quiz-ui').classList.add('flex');
            renderQuestion();
        }

        function renderQuestion() {
            const currentQ = questions[currentIndex];
            isAnswered = false;
            selectedAns = null;

            // UI Update
            document.getElementById('current-page-num').innerText = currentIndex + 1;
            document.getElementById('display-q-num').innerText = currentIndex + 1;
            document.getElementById('data-entry-id').innerText = `#DATA_ENTRY_${currentQ.id}`;
            document.getElementById('question-text').innerText = currentQ.q;
            document.getElementById('explanation-area').classList.add('hidden');
            
            // Progress Bar
            const progress = (currentIndex / 60) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;
            document.getElementById('progress-text').innerText = currentIndex;

            // Options
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            currentQ.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = `w-full p-5 text-left rounded-2xl border-2 transition-all flex items-center justify-between group border-[#FEE500]/30 bg-gray-50/50 hover:border-[#FEE500] hover:bg-[#FEE500]/5 active:scale-[0.98]`;
                btn.innerHTML = `
                    <span class="font-extrabold text-[#3C1E1E]">
                        <span class="mr-3 text-gray-400 font-medium">${idx + 1}.</span> ${opt}
                    </span>
                    <div id="status-icon-${idx}"></div>
                `;
                btn.onclick = () => handleAnswer(idx);
                container.appendChild(btn);
            });

            // Re-initialize Icons
            lucide.createIcons();
            window.scrollTo(0, 0);
        }

        function handleAnswer(idx) {
            if (isAnswered) return;
            
            isAnswered = true;
            selectedAns = idx;
            const currentQ = questions[currentIndex];
            const isCorrect = currentQ.ans === idx;
            if (isCorrect) score++;

            const options = document.getElementById('options-container').children;
            
            for (let i = 0; i < options.length; i++) {
                const btn = options[i];
                btn.disabled = true;
                const iconContainer = btn.querySelector('[id^="status-icon-"]');
                
                if (i === currentQ.ans) {
                    btn.classList.remove('border-[#FEE500]/30', 'bg-gray-50/50');
                    btn.classList.add('border-green-500', 'bg-green-50/50', 'text-green-800');
                    iconContainer.innerHTML = '<div class="bg-green-500 p-1 rounded-full shadow-sm shadow-green-200"><i data-lucide="check-circle-2" class="w-[18px] h-[18px] text-white"></i></div>';
                } else if (i === selectedAns) {
                    btn.classList.remove('border-[#FEE500]/30', 'bg-gray-50/50');
                    btn.classList.add('border-red-500', 'bg-red-50/50', 'text-red-800');
                    iconContainer.innerHTML = '<div class="bg-red-500 p-1 rounded-full shadow-sm shadow-red-200"><i data-lucide="x-circle" class="w-[18px] h-[18px] text-white"></i></div>';
                } else {
                    btn.classList.add('opacity-40');
                }
            }

            // Show Explanation
            document.getElementById('explanation-text').innerText = currentQ.exp;
            document.getElementById('explanation-area').classList.remove('hidden');
            
            if (currentIndex === 59) {
                document.getElementById('next-btn-text').innerText = "최종 성과 보고";
            } else {
                document.getElementById('next-btn-text').innerText = "다음 문제로";
            }

            lucide.createIcons();
            
            // Progress Update
            const finalProgress = ((currentIndex + 1) / 60) * 100;
            document.getElementById('progress-bar').style.width = `${finalProgress}%`;
            document.getElementById('progress-text').innerText = currentIndex + 1;
        }

        function goToNextQuestion() {
            if (currentIndex < 59) {
                currentIndex++;
                renderQuestion();
            } else {
                showFinalResults();
            }
        }

        function showFinalResults() {
            document.getElementById('final-score').innerText = score;
            const percent = Math.round((score / 60) * 100);
            document.getElementById('final-grade').innerText = `${percent}점`;
            
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('result-screen').classList.add('flex');
            lucide.createIcons();
        }

        // Initialize Lucide icons on page load
        window.onload = () => {
            lucide.createIcons();
        };
    </script>
