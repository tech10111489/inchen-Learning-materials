    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDocs, collection, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        window.db = db;
        window.auth = auth;
        window.appId = appId;
        window.firestoreUtils = { collection, doc, setDoc, getDocs, query, serverTimestamp };

        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };
        initAuth();
    </script>

            { id: 2, q: "피부 분석의 방법인 문진법을 적용하기에 가장 거리가 먼 것은?", options: ["고객의 피부 배열 상태, 모공의 크기, 피부 투명도", "고객의 알레르기 유무, 피부 당김 현상, 가려움증, 여드름 발생 빈도", "고객의 건강상태와 진통제, 항생제 등 의약품 복용 여부", "고객의 연령, 직업, 결혼 유무, 취미"], ans: 0, exp: "모공 크기와 투명도 관찰은 시각을 사용하는 '견진법'에 해당합니다." },
            { id: 3, q: "피부 관리 작업단계가 옳은 것은?", options: ["피부분석 – 클렌징 – 매뉴얼테크닉 – 딥클렌징 – 팩 – 마무리", "클렌징 – 딥클렌징 – 팩 – 매뉴얼테크닉 – 마무리 – 피부분석", "클렌징 – 피부분석 – 딥클렌징 – 매뉴얼테크닉 – 팩 – 마무리", "피부분석 - 클렌징 – 딥클렌징 – 매뉴얼테크닉 – 팩 – 마무리"], ans: 2, exp: "정확한 피부분석은 클렌징으로 표면 노폐물을 제거한 직후에 시행하는 것이 원칙입니다." },
            { id: 4, q: "클렌징에 대한 설명이 아닌 것은?", options: ["피부의 피지, 메이크업 잔여물을 없애기 위한 작업이다.", "모공 깊숙이 있는 불순물과 피부 표면의 각질의 제거를 주목적으로 한다.", "제품 흡수를 효율적으로 도와준다.", "피부의 생리적인 기능을 정상적으로 도와준다."], ans: 1, exp: "각질 제거와 모공 깊숙한 세정은 '딥클렌징'의 주된 목적입니다." },
            { id: 5, q: "소독약제의 살균력시험 기준이 되는 것은?", options: ["과산화수소", "석탄산", "크레졸", "승홍수"], ans: 1, exp: "석탄산(Phenol)은 살균력을 비교하는 지표인 '석탄산 계수'의 기준 물질입니다." },
            { id: 6, q: "림프 드레니지의 주된작용은?", options: ["노폐물과 독소물질을 림프절로 운반", "림프순환 저하", "피부조직 강화", "혈액순환과 신진대사 저하"], ans: 0, exp: "림프 드레니쥐는 림프액의 흐름을 도와 체내 노폐물과 독소를 정화하는 역할을 합니다." },

            { id: 10, q: "갑상선의 기능과 관련이 있으며, 모세혈관 기능을 정상화시키는 것은?", options: ["요오드", "칼슘", "철분", "인"], ans: 0, exp: "요오드는 갑상선 호르몬의 주요 성분으로 신진대사와 혈관 건강에 기여합니다." },
            { id: 11, q: "항산화성 비타민으로 불리는 지용성 비타민은?", options: ["비타민 E", "비타민 A", "비타민 C", "비타민 B"], ans: 0, exp: "비타민 E(토코페롤)는 세포막의 산화를 방지하는 강력한 지용성 항산화제입니다." },
            { id: 12, q: "온습포에 대한 설명으로 틀린 것은?", options: ["피지 분비선을 자극해준다.", "여드름 및 모세혈관 확장 피부에는 주의가 필요하다.", "혈액순환을 촉진시킨다.", "모공을 축소시켜 노폐물, 불순물 등을 깨끗이 닦아낸다."], ans: 3, exp: "온습포는 모공을 '확장'시켜 배출을 돕는 역할을 하며, 축소는 냉습포의 역할입니다." },

            { id: 97, q: "이·미용업주가 이수해야 할 법정 위생교육 시간은?", options: ["매년 3시간", "분기별 3시간", "매년 6시간", "분기별 6시간"], ans: 0, exp: "공중위생 영업자는 매년 1회, 3시간의 교육을 이수해야 할 의무가 있습니다." },
            { id: 98, q: "피부의 면역 기능(항원 전달)에 관여하는 세포는?", options: ["머켈 세포", "말피기 세포", "랑게르한스 세포", "각질형성 세포"], ans: 2, exp: "표피의 유극층에 위치하며 면역 반응을 조절하는 핵심 세포입니다." },
            { id: 99, q: "가장 빠르고 완벽한 멸균을 제공하는 소독 방법은?", options: ["유통증기법", "건열소독", "간헐살균법", "고압증기법"], ans: 3, exp: "오토클레이브(고압증기)는 고온 고압을 이용해 아포까지 파괴하는 가장 확실한 멸균법입니다." },
            { id: 100, q: "1회용 면도날 2인 이상 사용 시 1차 위반 처분은?", options: ["정지 10일", "폐쇄명령", "정지 5일", "경고"], ans: 3, exp: "위생 기준 위반이나 최초 위반 시에는 시정 명령 성격의 '경고'가 부여됩니다." },
            { id: 101, q: "인체 내 수분 배출량이 가장 많은 순서로 바른 것은?", options: ["폐/피부-소변-땀-대변", "소변-대변-땀-폐/피부", "소변-땀-대변-폐/피부", "소변-폐/피부-땀-대변"], ans: 3, exp: "일반적으로 신장을 통한 소변 배출이 가장 많고, 그 다음 호흡과 피부를 통한 불감 증설이 뒤를 잇습니다." }
        ];

        // --- 앱 상태 관리 ---
        let questions = [];
        let currentIndex = 0;
        let score = 0;
        let isAnswered = false;
        let currentStudent = "";

        // --- 로그인 및 인증 로직 (교육생 명부 업데이트) ---
        function validateLogin() {
            const nameInput = document.getElementById('userName').value.trim();
            const passInput = document.getElementById('userPass').value.trim();
            const errorMsg = document.getElementById('loginError');

            // 실장님 지시사항: 최신 교육생 명부 21명 반영
            const attendanceBook = {
                "김다솜": "1",
                "김민": "2",
                "김윤아": "3",
                "김은서": "4",
                "김지은": "5",
                "노시윤": "6",
                "박서휘": "7",
                "서정화": "9",
                "손권희": "10",
                "신지영": "11",
                "윤태연": "12",
               "임초은": "13",
                "장윤정": "14",
                "정서영": "15",
                "정예지": "16",
                "최지원": "17",
                "황수빈": "18",
                "송미림": "19",
                "홍길동": "21",
                "루미나래": "1019"
            };

            if (attendanceBook[nameInput] && attendanceBook[nameInput] === passInput) {
                currentStudent = nameInput;
                sessionStorage.setItem('lum_user', nameInput);
                document.getElementById('user-display').innerText = `User: ${nameInput}`;
                document.getElementById('login-overlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('login-overlay').style.display = 'none';
                    document.getElementById('intro-screen').classList.remove('hidden');
                    document.getElementById('intro-screen').classList.add('flex');
                }, 500);
            } else {
                errorMsg.classList.remove('hidden');
                document.getElementById('userPass').value = "";
            }
        }

        function startQuiz() {
            questions = [...ALL_QUESTIONS];
            currentIndex = 0; score = 0;
            
            document.getElementById('total-pages-num').innerText = questions.length;
            document.getElementById('progress-total').innerText = questions.length;
            document.querySelectorAll('.total-score-label').forEach(el => el.innerText = questions.length);

            document.getElementById('intro-screen').classList.add('hidden');
            document.getElementById('quiz-ui').classList.remove('hidden');
            document.getElementById('quiz-ui').classList.add('flex');
            renderQuestion();
        }

        function renderQuestion() {
            if (currentIndex >= questions.length) { showResults(); return; }
            const q = questions[currentIndex];
            isAnswered = false;

            document.getElementById('current-page-num').innerText = currentIndex + 1;
            document.getElementById('display-q-num').innerText = currentIndex + 1;
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('explanation-area').classList.add('hidden');
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            q.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = `w-full p-5 text-left rounded-xl border-2 border-gray-50 bg-white flex items-center gap-4 transition-all premium-shadow group`;
                btn.innerHTML = `
                    <span class="w-8 h-8 rounded-full border border-gray-100 flex items-center justify-center text-[10px] font-black group-hover:bg-[#C5A059] group-hover:text-white transition-all">${idx + 1}</span>
                    <span class="font-bold text-[#1A2238] text-[15px]">${opt}</span>
                `;
                btn.onclick = () => handleAnswer(idx);
                container.appendChild(btn);
            });

            const progress = (currentIndex / questions.length) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;
            document.getElementById('progress-text').innerText = currentIndex;

            lucide.createIcons();
            window.scrollTo({top:0, behavior:'smooth'});
        }

        function handleAnswer(idx) {
            if (isAnswered) return;
            isAnswered = true;
            const q = questions[currentIndex];
            const isCorrect = q.ans === idx;
            if (isCorrect) score++;

            const btns = document.getElementById('options-container').children;
            for(let i=0; i<btns.length; i++) {
                btns[i].disabled = true;
                if (i === q.ans) btns[i].classList.add('border-green-500', 'bg-green-50/50');
                else if (i === idx) btns[i].classList.add('border-red-500', 'bg-red-50/50');
                else btns[i].classList.add('opacity-40');
            }

            document.getElementById('explanation-text').innerText = q.exp;
            document.getElementById('explanation-area').classList.remove('hidden');
            if (currentIndex === questions.length - 1) document.getElementById('next-btn-text').innerText = "SEE PERFORMANCE REPORT";
            lucide.createIcons();
        }

        function goToNextQuestion() {
            if (currentIndex < questions.length - 1) { currentIndex++; renderQuestion(); }
            else { showResults(); }
        }

        async function saveScore() {
            if (!auth.currentUser) return;
            const docRef = firestoreUtils.doc(db, 'artifacts', appId, 'public', 'data', 'scores', currentStudent);
            await firestoreUtils.setDoc(docRef, {
                userName: currentStudent,
                score: score,
                timestamp: firestoreUtils.serverTimestamp()
            });
        }

        async function fetchRankings() {
            const list = document.getElementById('ranking-list');
            try {
                const querySnapshot = await firestoreUtils.getDocs(firestoreUtils.collection(db, 'artifacts', appId, 'public', 'data', 'scores'));
                let data = [];
                querySnapshot.forEach(doc => data.push(doc.data()));
                data.sort((a, b) => b.score - a.score);
                const top5 = data.slice(0, 5);
                list.innerHTML = top5.map((r, i) => `
                    <div class="rank-item flex items-center justify-between p-4 rounded-xl">
                        <div class="flex items-center gap-4">
                            <span class="font-black text-[#C5A059] text-sm">${i + 1}</span>
                            <span class="font-bold text-[#1A2238] text-sm">${r.userName}</span>
                        </div>
                        <span class="font-black text-[#1A2238] text-sm">${r.score}<span class="text-[10px] text-gray-300 ml-0.5">pts</span></span>
                    </div>
                `).join('');
            } catch (e) { list.innerHTML = '<p class="text-center text-red-300 py-4 text-[10px]">Failed to load.</p>'; }
            lucide.createIcons();
        }

        async function showResults() {
            document.getElementById('final-score').innerText = score;
            document.getElementById('final-percent').innerText = `${Math.round((score / questions.length) * 100)}%`;
            document.getElementById('result-user-name').innerText = `Performance Report: ${currentStudent}`;
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('result-screen').classList.add('flex');
            await saveScore();
            await fetchRankings();
        }

        window.onload = () => {
            const saved = sessionStorage.getItem('lum_user');
            if (saved) {
                currentStudent = saved;
                document.getElementById('user-display').innerText = `User: ${saved}`;
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('intro-screen').classList.remove('hidden');
                document.getElementById('intro-screen').classList.add('flex');
            }
            lucide.createIcons();
        };
    </script>
</body>
</html>
